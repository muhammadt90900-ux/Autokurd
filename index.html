<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>ئۆتۆکورد VIP</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <!-- فۆنت و ئایکۆن -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rabar&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ... هەمان ستایلی پێشوو بەڵام لێرە دەبێت بیخەیتەوە ...
       بۆ کورتکردنەوە، ستایلەکانی پێشوو بە تەواوی لە کۆدی خوارەوە کۆپیکراوە. */
    :root {
      --bg: #ffffff; --bg2: #f5f5f7; --card: #ffffff; --text: #1a1a2e; --text2: #555;
      --accent: #e63946; --accent2: #ff6b6b; --gold: #f4a261; --gold2: #e9c46a;
      --nav-bg: #ffffff; --border: #e0e0e0; --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12); --radius: 16px; --radius-sm: 10px;
      --transition: 0.3s cubic-bezier(0.4,0,0.2,1); --skeleton: #e8e8e8;
    }
    .dark-mode {
      --bg: #0d0d1a; --bg2: #141428; --card: #1a1a30; --text: #e8e8f0; --text2: #aaa;
      --nav-bg: #12122a; --border: #2a2a44; --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5); --skeleton: #2a2a40;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      font-family: 'Rabar', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text);
      transition: background var(--transition), color var(--transition); max-width:500px; margin:0 auto;
      min-height:100vh; padding-bottom:80px; user-select:none; -webkit-user-select:none;
    }
    .app-header {
      position:sticky; top:0; z-index:100; background:var(--bg); padding:12px 16px;
      display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border);
      backdrop-filter:blur(20px); transition:all var(--transition);
    }
    .app-logo { font-size:1.5em; font-weight:900; background: linear-gradient(135deg, var(--accent), var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .header-icons { display:flex; gap:12px; align-items:center; }
    .header-icon {
      width:38px; height:38px; border-radius:50%; background:var(--bg2); border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center; font-size:1.1em; color:var(--text);
      transition:all var(--transition); position:relative;
    }
    .header-icon:hover { background:var(--accent); color:#fff; transform:scale(1.05); }
    .notif-dot { position:absolute; top:6px; right:6px; width:10px; height:10px; background:var(--accent); border-radius:50%; border:2px solid var(--bg); animation:pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5)} }
    .bottom-nav {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:500px;
      background:var(--nav-bg); border-top:1px solid var(--border); display:flex; justify-content:space-around;
      align-items:center; padding:8px 4px 14px; z-index:100; backdrop-filter:blur(20px); transition:all var(--transition);
    }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; color:var(--text2); transition:all var(--transition); font-size:0.7em; padding:6px 12px; border-radius:20px; background:none; border:none; font-family:inherit; }
    .nav-item i { font-size:1.5em; transition:all var(--transition); }
    .nav-item.active { color:var(--accent); font-weight:700; }
    .nav-item.active i { transform:translateY(-2px); text-shadow:0 4px 12px rgba(230,57,70,0.4); }
    .plus-btn i { font-size:2em; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:glow-pulse 2s infinite; }
    @keyframes glow-pulse { 0%,100%{filter:drop-shadow(0 0 4px rgba(230,57,70,0.5))} 50%{filter:drop-shadow(0 0 16px rgba(230,57,70,0.9))} }
    .page { display:none; padding:16px; animation:fadeSlideIn 0.35s ease-out; }
    .page.active { display:block; }
    @keyframes fadeSlideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .car-card {
      background:var(--card); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow);
      margin-bottom:16px; transition:all var(--transition); cursor:pointer; position:relative; border:1px solid var(--border);
    }
    .car-card.vip-featured { border:2px solid var(--gold); box-shadow:0 0 20px rgba(244,162,97,0.3); }
    .car-card-img { width:100%; height:220px; object-fit:cover; display:block; }
    .car-card-badge { position:absolute; top:12px; left:12px; background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#1a1a2e; padding:5px 12px; border-radius:20px; font-size:0.75em; font-weight:700; z-index:2; }
    .car-card-badge.vip-badge { background:linear-gradient(135deg,#1a1a2e,#16213e); color:var(--gold); left:auto; right:12px; }
    .car-card-body { padding:12px 14px; }
    .car-card-title { font-weight:700; font-size:1.1em; margin-bottom:4px; display:flex; align-items:center; justify-content:space-between; }
    .car-card-price { color:var(--accent); font-weight:900; font-size:1.2em; }
    .car-card-location { color:var(--text2); font-size:0.85em; display:flex; align-items:center; gap:4px; }
    .fav-btn {
      position:absolute; top:12px; right:12px; z-index:3; width:36px; height:36px; border-radius:50%;
      background:rgba(0,0,0,0.5); border:none; cursor:pointer; color:#fff; font-size:1.1em;
      display:flex; align-items:center; justify-content:center; transition:all var(--transition); backdrop-filter:blur(4px);
    }
    .fav-btn.liked { background:var(--accent); animation:heartBeat 0.5s ease; }
    @keyframes heartBeat { 0%,100%{transform:scale(1)} 30%{transform:scale(1.3)} 60%{transform:scale(0.9)} }
    .search-box { display:flex; gap:8px; align-items:center; background:var(--bg2); border-radius:30px; padding:8px 16px; margin-bottom:12px; border:2px solid transparent; transition:all var(--transition); }
    .search-box:focus-within { border-color:var(--accent); box-shadow:0 0 0 4px rgba(230,57,70,0.1); }
    .search-box input { flex:1; border:none; background:transparent; padding:10px 0; font-size:1em; color:var(--text); font-family:inherit; outline:none; }
    .filter-chips { display:flex; gap:8px; overflow-x:auto; padding:8px 0; scrollbar-width:none; }
    .chip { padding:8px 16px; border-radius:20px; background:var(--bg2); border:1px solid var(--border); cursor:pointer; white-space:nowrap; font-size:0.85em; transition:all var(--transition); font-family:inherit; color:var(--text); }
    .chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:flex-end; justify-content:center; animation:fadeIn 0.25s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .modal-sheet { background:var(--card); width:100%; max-width:500px; border-radius:20px 20px 0 0; padding:20px; max-height:85vh; overflow-y:auto; animation:slideUp 0.35s ease; }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .modal-handle { width:40px; height:5px; background:var(--border); border-radius:10px; margin:0 auto 16px; }
    .form-group { margin-bottom:14px; }
    .form-group label { display:block; margin-bottom:6px; font-weight:600; font-size:0.9em; }
    .form-group input, .form-group select, .form-group textarea { width:100%; padding:12px 14px; border-radius:var(--radius-sm); border:2px solid var(--border); background:var(--bg2); color:var(--text); font-family:inherit; font-size:1em; transition:all var(--transition); }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--accent); outline:none; box-shadow:0 0 0 4px rgba(230,57,70,0.08); }
    .btn { padding:12px 24px; border-radius:30px; border:none; cursor:pointer; font-weight:700; font-size:1em; font-family:inherit; transition:all var(--transition); display:inline-flex; align-items:center; gap:8px; justify-content:center; }
    .btn-primary { background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#fff; width:100%; box-shadow:0 4px 16px rgba(230,57,70,0.3); }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(230,57,70,0.45); }
    .btn-outline { background:transparent; border:2px solid var(--accent); color:var(--accent); }
    .btn-gold { background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#1a1a2e; font-weight:900; width:100%; }
    .profile-avatar { width:80px; height:80px; border-radius:50%; object-fit:cover; border:4px solid var(--accent); box-shadow:0 4px 20px rgba(230,57,70,0.3); }
    .vip-plan-card { background:linear-gradient(135deg,#0a0a18,#1a1a3a); border-radius:var(--radius); padding:16px; color:#fff; margin:12px 0; text-align:center; border:2px solid var(--gold); }
    .vip-plan-card h3 { color:var(--gold); }
    .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--card); color:var(--text); padding:14px 20px; border-radius:30px; box-shadow:var(--shadow-lg); z-index:999; font-weight:600; animation:toastIn 0.4s ease, toastOut 0.4s ease 2.5s forwards; display:flex; align-items:center; gap:8px; border:1px solid var(--border); }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-30px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    @keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateX(-50%) translateY(-30px)} }
  </style>
</head>
<body>
  <!-- هێدەر -->
  <header class="app-header">
    <span class="app-logo">🚀 ئۆتۆکورد</span>
    <div class="header-icons">
      <button class="header-icon" onclick="toggleDarkMode()"><i class="fas fa-moon" id="darkIcon"></i></button>
      <button class="header-icon" onclick="showNotifications()"><i class="fas fa-bell"></i><span class="notif-dot" id="notifDot" style="display:none;"></span></button>
      <button class="header-icon" onclick="switchLanguage()"><i class="fas fa-globe"></i></button>
    </div>
  </header>

  <!-- پەڕەکان -->
  <div class="page active" id="page-home">
    <div style="display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;">
      <button class="chip active" data-filter="all">📋 <span data-i18n="all">هەمووی</span></button>
      <button class="chip" data-filter="vip">👑 VIP</button>
      <button class="chip" data-filter="video">🎥 <span data-i18n="video">ڤیدیۆ</span></button>
      <button class="chip" data-filter="cheap">💰 <span data-i18n="cheapest">هەرزان</span></button>
      <button class="chip" data-filter="new">🆕 <span data-i18n="newest">نوێترین</span></button>
    </div>
    <div id="homeFeed"></div>
  </div>
  <div class="page" id="page-search">
    <div class="search-box">
      <i class="fas fa-search" style="color:var(--text2)"></i>
      <input type="text" id="searchInput" placeholder="گەڕان...">
      <i class="fas fa-sliders-h" style="color:var(--accent);cursor:pointer" onclick="toggleFilterPanel()"></i>
    </div>
    <div id="filterPanel" style="display:none;">
      <div class="form-group"><label>💰 <span data-i18n="price">نرخ</span></label><div style="display:flex;gap:8px"><input type="number" id="priceMin" placeholder="کەمترین" onchange="searchCars()"><input type="number" id="priceMax" placeholder="زۆرترین" onchange="searchCars()"></div></div>
      <div class="form-group"><label>🚗 <span data-i18n="brand">براند</span></label><select id="brandFilter" onchange="searchCars()"><option value="">هەموو</option><option>تۆیۆتا</option><option>BMW</option><option>مرسیدس</option><option>هیوندا</option></select></div>
      <div class="form-group"><label>📅 <span data-i18n="year">ساڵ</span></label><select id="yearFilter" onchange="searchCars()"><option value="">هەموو</option><option>2024</option><option>2023</option><option>2022</option></select></div>
      <div class="form-group"><label>📍 <span data-i18n="location">شوێن</span></label><select id="locationFilter" onchange="searchCars()"><option value="">هەموو</option><option>هەولێر</option><option>سلێمانی</option><option>دهۆک</option></select></div>
      <button class="btn btn-outline" onclick="resetFilters()" style="width:100%;">🔄 <span data-i18n="reset">ڕیسێت</span></button>
    </div>
    <div id="searchResults"></div>
  </div>
  <div class="page" id="page-post">
    <h2>📸 <span data-i18n="post_car">ئۆتۆمبێل زیاد بکە</span></h2>
    <div class="form-group"><label>📷 <span data-i18n="image">وێنە</span></label><input type="file" id="postImageFile" accept="image/*"></div>
    <div class="form-group"><label>🎥 <span data-i18n="video">ڤیدیۆ</span></label><input type="file" id="postVideoFile" accept="video/*"></div>
    <div class="form-group"><label>🚗 <span data-i18n="car_name">ناوی ئۆتۆمبێل</span></label><input type="text" id="postTitle"></div>
    <div class="form-group"><label>💰 <span data-i18n="price">نرخ</span></label><input type="number" id="postPrice"></div>
    <div class="form-group"><label>🚘 <span data-i18n="brand">براند</span></label><select id="postBrand"><option>تۆیۆتا</option><option>BMW</option><option>مرسیدس</option></select></div>
    <div class="form-group"><label>📅 <span data-i18n="year">ساڵ</span></label><input type="number" id="postYear"></div>
    <div class="form-group"><label>📍 <span data-i18n="location">شوێن</span></label><select id="postLocation"><option>هەولێر</option><option>سلێمانی</option><option>دهۆک</option></select></div>
    <div class="form-group"><label><input type="checkbox" id="postVip"> 👑 VIP</label></div>
    <button class="btn btn-primary" onclick="uploadCar()">🚀 <span data-i18n="publish">بڵاوکردنەوە</span></button>
    <progress id="uploadProgress" value="0" max="100" style="width:100%;margin-top:8px;display:none;"></progress>
  </div>
  <div class="page" id="page-favorites">
    <h2>❤️ <span data-i18n="favorites">دڵخوازەکان</span></h2>
    <div id="favoritesList"></div>
  </div>
  <div class="page" id="page-profile">
    <div style="text-align:center;margin-bottom:20px;">
      <img id="profileAvatar" class="profile-avatar" src="https://ui-avatars.com/api/?name=User&background=e63946&color=fff&size=120&bold=true">
      <h3 id="profileName">بەکارهێنەر</h3>
      <p id="profileEmail" style="color:var(--text2)"></p>
      <span id="profileBadge" style="background:var(--bg2);padding:6px 14px;border-radius:20px;">⭐ Free</span>
    </div>
    <div class="vip-plan-card">
      <h3>👑 <span data-i18n="vip_plans">پلانەکانی VIP</span></h3>
      <button class="btn btn-gold" onclick="upgradeVip('vip')" style="margin:4px;">👑 VIP</button>
      <button class="btn btn-gold" onclick="upgradeVip('pro')" style="margin:4px;">💎 PRO</button>
    </div>
    <h4>🚗 <span data-i18n="my_cars">ئۆتۆمبێلەکانم</span></h4>
    <div id="myCarsList"></div>
    <button class="btn btn-outline" onclick="showLoginModal()" style="width:100%;margin-top:12px;">🔐 <span data-i18n="login">چوونەژوورەوە</span></button>
    <button class="btn btn-outline" onclick="logout()" style="width:100%;margin-top:4px;">🚪 <span data-i18n="logout">چوونەدەرەوە</span></button>
  </div>

  <!-- مۆداڵی لۆگین -->
  <div class="modal-overlay" id="loginModal" style="display:none;" onclick="if(event.target===this)closeLoginModal()">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h3>🔐 <span data-i18n="login_title">بەخێربێیت</span></h3>
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail"></div>
      <div class="form-group"><label><span data-i18n="password">پاسۆرد</span></label><input type="password" id="loginPassword"></div>
      <button class="btn btn-primary" onclick="login()">🔓 <span data-i18n="signin">چوونەژوورەوە</span></button>
      <p style="text-align:center;margin-top:8px;cursor:pointer;" onclick="signUp()">📝 <span data-i18n="signup">خۆتۆمارکردن</span></p>
    </div>
  </div>

  <!-- ناڤیگەیشن -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home"><i class="fas fa-home"></i><span data-i18n="home">سەرەکی</span></button>
    <button class="nav-item" data-page="search"><i class="fas fa-search"></i><span data-i18n="search">گەڕان</span></button>
    <button class="nav-item plus-btn" data-page="post"><i class="fas fa-plus-circle"></i><span data-i18n="post">پۆست</span></button>
    <button class="nav-item" data-page="favorites"><i class="fas fa-heart"></i><span data-i18n="fav">دڵخواز</span></button>
    <button class="nav-item" data-page="profile"><i class="fas fa-user"></i><span data-i18n="profile">پڕۆفایل</span></button>
  </nav>

  <script>
    // ==================== Firebase Config ====================
    const firebaseConfig = {
      apiKey: "AIzaSy...YOUR_KEY",
      authDomain: "your-project.firebaseapp.com",
      projectId: "your-project-id",
      storageBucket: "your-project.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abc123"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    // ==================== زمان (کوردی، عەرەبی، ئینگلیزی) ====================
    const i18n = {
      ckb: {
        all:"هەمووی", video:"ڤیدیۆ", cheapest:"هەرزان", newest:"نوێترین",
        price:"نرخ", brand:"براند", year:"ساڵ", location:"شوێن", reset:"ڕیسێت",
        post_car:"ئۆتۆمبێل زیاد بکە", image:"وێنە", video_title:"ڤیدیۆ",
        car_name:"ناوی ئۆتۆمبێل", publish:"بڵاوکردنەوە", favorites:"دڵخوازەکان",
        my_cars:"ئۆتۆمبێلەکانم", vip_plans:"پلانەکانی VIP", login:"چوونەژوورەوە",
        logout:"چوونەدەرەوە", login_title:"بەخێربێیت", password:"پاسۆرد",
        signin:"چوونەژوورەوە", signup:"خۆتۆمارکردن", home:"سەرەکی",
        search:"گەڕان", post:"پۆست", fav:"دڵخواز", profile:"پڕۆفایل"
      },
      ar: {
        all:"الكل", video:"فيديو", cheapest:"الأرخص", newest:"الأحدث",
        price:"السعر", brand:"العلامة", year:"السنة", location:"الموقع", reset:"إعادة ضبط",
        post_car:"أضف سيارة", image:"صورة", video_title:"فيديو",
        car_name:"اسم السيارة", publish:"نشر", favorites:"المفضلة",
        my_cars:"سياراتي", vip_plans:"خطط VIP", login:"تسجيل الدخول",
        logout:"تسجيل الخروج", login_title:"مرحباً", password:"كلمة المرور",
        signin:"دخول", signup:"إنشاء حساب", home:"الرئيسية",
        search:"بحث", post:"إضافة", fav:"مفضلة", profile:"حسابي"
      },
      en: {
        all:"All", video:"Video", cheapest:"Cheapest", newest:"Newest",
        price:"Price", brand:"Brand", year:"Year", location:"Location", reset:"Reset",
        post_car:"Post a Car", image:"Image", video_title:"Video",
        car_name:"Car Name", publish:"Publish", favorites:"Favorites",
        my_cars:"My Cars", vip_plans:"VIP Plans", login:"Login",
        logout:"Logout", login_title:"Welcome", password:"Password",
        signin:"Sign In", signup:"Sign Up", home:"Home",
        search:"Search", post:"Post", fav:"Fav", profile:"Profile"
      }
    };
    let currentLang = 'ckb';
    function setLanguage(lang) {
      currentLang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[lang] && i18n[lang][key]) el.textContent = i18n[lang][key];
      });
      if (lang === 'ckb') document.documentElement.dir = 'rtl';
      else document.documentElement.dir = 'ltr';
    }
    function switchLanguage() {
      const langs = ['ckb', 'ar', 'en'];
      const idx = langs.indexOf(currentLang);
      const next = langs[(idx+1) % langs.length];
      setLanguage(next);
      showToast('🌐 '+ (next==='ar'?'العربية':next==='en'?'English':'کوردی'));
    }

    // ==================== باری ئەپ ====================
    let allCars = [];
    let userFavorites = [];
    let currentFilter = 'all';
    let unsubscribeCars = null;
    let darkMode = false;

    // ==================== Firebase Auth ====================
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('notifDot').style.display = 'block';
        loadUserProfile(user);
        loadMyCars(user.uid);
      } else {
        document.getElementById('notifDot').style.display = 'none';
        document.getElementById('profileName').textContent = 'بەکارهێنەر';
        document.getElementById('profileEmail').textContent = '';
        document.getElementById('myCarsList').innerHTML = '<p>هێشتا هیچ پۆستێکت نەکردووە</p>';
      }
      renderHome();
    });

    function loadUserProfile(user) {
      db.collection('users').doc(user.uid).get().then(doc => {
        if (doc.exists) {
          const data = doc.data();
          document.getElementById('profileName').textContent = data.displayName || user.email.split('@')[0];
          document.getElementById('profileEmail').textContent = user.email;
          document.getElementById('profileBadge').textContent = data.vipLevel === 'pro' ? '💎 PRO' : data.vipLevel === 'vip' ? '👑 VIP' : '⭐ Free';
          document.getElementById('profileAvatar').src = data.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.displayName||'U')}&background=e63946&color=fff`;
        }
      });
    }

    function login() {
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPassword').value;
      auth.signInWithEmailAndPassword(email, pass)
        .then(() => { closeLoginModal(); showToast('✅ چوویتە ژوورەوە'); })
        .catch(err => showToast('⚠️ ' + err.message));
    }
    function signUp() {
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPassword').value;
      auth.createUserWithEmailAndPassword(email, pass)
        .then(cred => {
          return db.collection('users').doc(cred.user.uid).set({
            displayName: email.split('@')[0],
            email: email,
            photoURL: '',
            vipLevel: 'free'
          });
        })
        .then(() => { closeLoginModal(); showToast('🎉 هەژمارت دروست بوو'); })
        .catch(err => showToast('⚠️ ' + err.message));
    }
    function logout() {
      auth.signOut();
      showToast('🚪 چوویتە دەرەوە');
    }
    function showLoginModal() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }

    // ==================== فایەربەیس: ئۆتۆمبێلەکان ====================
    function loadCars() {
      if (unsubscribeCars) unsubscribeCars();
      unsubscribeCars = db.collection('cars').orderBy('createdAt', 'desc')
        .onSnapshot(snapshot => {
          allCars = [];
          snapshot.forEach(doc => {
            allCars.push({ id: doc.id, ...doc.data() });
          });
          renderHome();
          if (document.getElementById('page-favorites').classList.contains('active')) renderFavorites();
        });
    }
    loadCars();

    function renderHome() {
      const feed = document.getElementById('homeFeed');
      let cars = [...allCars];
      if (currentFilter === 'vip') cars = cars.filter(c => c.vip);
      else if (currentFilter === 'video') cars = cars.filter(c => c.videoUrl);
      else if (currentFilter === 'cheap') cars.sort((a,b)=>a.price-b.price);
      else if (currentFilter === 'new') cars.sort((a,b)=>b.year-a.year);
      if (cars.length === 0) {
        feed.innerHTML = '<p style="text-align:center;padding:40px;">🚗 هیچ ئۆتۆمبێلێک نییە</p>';
        return;
      }
      feed.innerHTML = cars.map(car => createCarCard(car)).join('');
      document.querySelectorAll('#homeFeed .fav-btn').forEach(btn => {
        btn.onclick = (e) => { e.stopPropagation(); toggleFav(btn.dataset.carId); };
      });
    }

    function createCarCard(car) {
      const uid = auth.currentUser?.uid;
      const liked = userFavorites.includes(car.id);
      return `
        <div class="car-card ${car.vip?'vip-featured':''}" data-car-id="${car.id}">
          <img src="${car.imageUrl || 'https://via.placeholder.com/400'}" class="car-card-img">
          ${car.vip ? '<span class="car-card-badge vip-badge">👑 VIP</span>' : ''}
          <button class="fav-btn ${liked?'liked':''}" data-car-id="${car.id}"><i class="fas fa-heart"></i></button>
          <div class="car-card-body">
            <div class="car-card-title">${car.title} <small>👁 ${car.views||0}</small></div>
            <div class="car-card-price">💰 $${car.price.toLocaleString()}</div>
            <div class="car-card-location">📍 ${car.location} · ${car.year}</div>
            ${car.videoUrl ? '<span style="color:var(--accent);">🎥 ڤیدیۆ</span>' : ''}
          </div>
        </div>`;
    }

    function toggleFav(carId) {
      if (!auth.currentUser) { showToast('⚠️ پێویستە بچیتە ژوورەوە'); return; }
      const ref = db.collection('users').doc(auth.currentUser.uid).collection('favorites').doc(carId);
      if (userFavorites.includes(carId)) {
        ref.delete();
      } else {
        ref.set({ carId });
      }
      showToast('❤️ نوێکرایەوە');
    }

    // بارکردنی دڵخوازەکان
    auth.onAuthStateChanged(user => {
      if (user) {
        db.collection('users').doc(user.uid).collection('favorites').onSnapshot(snap => {
          userFavorites = snap.docs.map(d => d.id);
          renderHome();
        });
      } else {
        userFavorites = [];
      }
    });

    // ==================== بارکردنی فایلی وێنە و ڤیدیۆ ====================
    async function uploadCar() {
      if (!auth.currentUser) { showToast('⚠️ پێویستە بچیتە ژوورەوە'); return; }
      const title = document.getElementById('postTitle').value.trim();
      const price = +document.getElementById('postPrice').value;
      const brand = document.getElementById('postBrand').value;
      const year = +document.getElementById('postYear').value;
      const location = document.getElementById('postLocation').value;
      const isVip = document.getElementById('postVip').checked;
      const imageFile = document.getElementById('postImageFile').files[0];
      const videoFile = document.getElementById('postVideoFile').files[0];
      if (!title || !price || !imageFile) { showToast('⚠️ ناو، نرخ و وێنە پێویستە'); return; }
      const progress = document.getElementById('uploadProgress');
      progress.style.display = 'block';
      try {
        const uid = auth.currentUser.uid;
        const imgRef = storage.ref(`cars/${uid}/${Date.now()}_${imageFile.name}`);
        await imgRef.put(imageFile);
        const imageUrl = await imgRef.getDownloadURL();
        let videoUrl = null;
        if (videoFile) {
          const vidRef = storage.ref(`cars/${uid}/${Date.now()}_${videoFile.name}`);
          await vidRef.put(videoFile);
          videoUrl = await vidRef.getDownloadURL();
        }
        await db.collection('cars').add({
          title, price, brand, year, location, vip: isVip,
          imageUrl, videoUrl, views: 0,
          sellerId: uid,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast('✅ ئۆتۆمبێل زیادکرا');
        document.querySelectorAll('#page-post input, #page-post select').forEach(el => el.value = '');
        document.getElementById('postVip').checked = false;
        document.getElementById('uploadProgress').style.display = 'none';
      } catch (err) {
        showToast('❌ هەڵە: ' + err.message);
        progress.style.display = 'none';
      }
    }

    function loadMyCars(uid) {
      db.collection('cars').where('sellerId', '==', uid).get().then(snap => {
        const html = snap.docs.map(doc => {
          const car = doc.data();
          return `<div style="display:flex;align-items:center;gap:12px;padding:10px;border-bottom:1px solid var(--border);">
            <img src="${car.imageUrl}" style="width:60px;height:60px;border-radius:10px;object-fit:cover;">
            <div style="flex:1"><strong>${car.title}</strong><br><small>💰 $${car.price}</small></div>
            <button onclick="deleteCar('${doc.id}')" style="background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:16px;">🗑</button></div>`;
        }).join('');
        document.getElementById('myCarsList').innerHTML = html || '<p>هێشتا هیچ پۆستێکت نەکردووە</p>';
      });
    }

    function deleteCar(id) {
      if (confirm('دڵنیایت؟')) {
        db.collection('cars').doc(id).delete().then(() => showToast('🗑 سڕایەوە'));
      }
    }

    function upgradeVip(level) {
      if (!auth.currentUser) { showToast('⚠️ پێویستە بچیتە ژوورەوە'); return; }
      db.collection('users').doc(auth.currentUser.uid).update({ vipLevel: level }).then(() => {
        showToast(level === 'pro' ? '💎 PRO!' : '👑 VIP!');
        loadUserProfile(auth.currentUser);
      });
    }

    // ==================== گەڕان ====================
    function searchCars() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const min = +document.getElementById('priceMin').value || 0;
      const max = +document.getElementById('priceMax').value || Infinity;
      const brand = document.getElementById('brandFilter').value;
      const year = document.getElementById('yearFilter').value;
      const loc = document.getElementById('locationFilter').value;
      const results = allCars.filter(c => 
        (c.title?.toLowerCase().includes(q) || c.brand?.toLowerCase().includes(q)) &&
        c.price >= min && c.price <= max &&
        (!brand || c.brand === brand) &&
        (!year || c.year === +year) &&
        (!loc || c.location === loc)
      );
      document.getElementById('searchResults').innerHTML = results.map(c => createCarCard(c)).join('') || '<p>نەدۆزرایەوە</p>';
    }
    function resetFilters() {
      document.getElementById('priceMin').value = document.getElementById('priceMax').value = '';
      document.getElementById('brandFilter').value = document.getElementById('yearFilter').value = document.getElementById('locationFilter').value = '';
      document.getElementById('searchInput').value = '';
      searchCars();
    }
    function toggleFilterPanel() {
      document.getElementById('filterPanel').style.display = document.getElementById('filterPanel').style.display === 'none' ? 'block' : 'none';
    }

    // ==================== ناڤیگەیشن ====================
    function navigateTo(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-'+page).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');
      if (page === 'home') renderHome();
      if (page === 'favorites') renderFavorites();
      if (page === 'search') searchCars();
    }
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => navigateTo(btn.dataset.page));
    });
    document.querySelectorAll('#page-home .chip').forEach(chip => {
      chip.addEventListener('click', function() {
        document.querySelectorAll('#page-home .chip').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        currentFilter = this.dataset.filter;
        renderHome();
      });
    });

    function renderFavorites() {
      const favCars = allCars.filter(c => userFavorites.includes(c.id));
      document.getElementById('favoritesList').innerHTML = favCars.length === 0 ? '<p>❤️ هیچ دڵخوازێک نییە</p>' : favCars.map(c => createCarCard(c)).join('');
    }

    function showNotifications() {
      alert('ئاگاداریەکان: ئۆتۆمبێلی نوێ زیادکرا، نرخێک دابەزی');
    }

    function toggleDarkMode() {
      darkMode = !darkMode;
      document.body.classList.toggle('dark-mode', darkMode);
      document.getElementById('darkIcon').className = darkMode ? 'fas fa-sun' : 'fas fa-moon';
    }

    function showToast(msg) {
      const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
      document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
    }

    setLanguage('ckb');
  </script>
</body>
</html>
